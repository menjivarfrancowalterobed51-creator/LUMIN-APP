<!DOCTYPE html>
<html lang="es">
<head>
    <title>LUMIN - Control Global</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #121212; color: white; margin: 0; padding: 20px; }
        h1 { color: #00d4ff; margin-bottom: 5px; }
        .subtitle { color: #888; font-size: 14px; margin-bottom: 25px; }
        .grid-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; max-width: 450px; margin: 0 auto; }
        .relay-card { background: #1e1e1e; padding: 15px; border-radius: 15px; border: 1px solid #333; position: relative; }
        .header-card { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .label-text { font-size: 12px; font-weight: bold; color: #00d4ff; text-transform: uppercase; }
        .edit-btn { background: none; border: none; color: #555; cursor: pointer; font-size: 14px; }
        .btn { 
            width: 90px; height: 90px; border-radius: 50%; border: none;
            font-size: 14px; font-weight: bold; cursor: pointer;
            transition: 0.3s; outline: none;
        }
        .off { background: #2a2a2a; color: #666; box-shadow: inset 0 0 10px #000; }
        .on { background: #27ae60; color: white; box-shadow: 0 0 20px rgba(39, 174, 96, 0.5); }
    </style>
</head>
<body>

    <h1>LUMIN</h1>
    <p class="subtitle">Sincronización Total en la Nube</p>
    
    <div class="grid-container" id="panel"></div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = { databaseURL: "https://lumin-f46e0-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const panel = document.getElementById('panel');

        for (let i = 1; i <= 8; i++) {
            const tag = `rele${i}`;
            const card = document.createElement('div');
            card.className = 'relay-card';
            card.innerHTML = `
                <div class="header-card">
                    <span class="label-text" id="lbl${i}">CARGANDO...</span>
                    <button class="edit-btn" onclick="rename('${tag}', ${i})">✎</button>
                </div>
                <button id="btn${i}" class="btn off" onclick="control('${tag}', ${i})">...</button>
            `;
            panel.appendChild(card);

            // ESCUCHAR NOMBRE DESDE FIREBASE (Para todos los dispositivos)
            db.ref(`nombres/${tag}`).on('value', (snapshot) => {
                const nombre = snapshot.val() || `CANAL ${i}`;
                document.getElementById(`lbl${i}`).innerText = nombre;
            });

            // ESCUCHAR ESTADO DEL RELÉ (Lógica Inversa)
            db.ref(`reles/${tag}`).on('value', (snapshot) => {
                const val = snapshot.val();
                const btn = document.getElementById(`btn${i}`);
                if (val == 0) {
                    btn.className = "btn on"; btn.innerText = "ON";
                } else {
                    btn.className = "btn off"; btn.innerText = "OFF";
                }
            });
        }

        // CAMBIAR NOMBRE EN LA NUBE
        function rename(tag, id) {
            const nuevoNombre = prompt("Nuevo nombre para este dispositivo:");
            if (nuevoNombre != null && nuevoNombre.trim() !== "") {
                db.ref(`nombres/${tag}`).set(nuevoNombre.trim().toUpperCase());
            }
        }

        // CONTROL DE RELÉ
        function control(tag, id) {
            const btn = document.getElementById(`btn${id}`);
            const sendVal = btn.classList.contains('on') ? 1 : 0;
            db.ref(`reles/${tag}`).set(sendVal);
        }
    </script>
</body>
</html>
